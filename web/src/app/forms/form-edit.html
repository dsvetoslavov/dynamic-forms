<div class="container">
  <div class="top-bar">
    <h1>{{ isNew() ? 'New Form' : 'Edit Form' }}</h1>
    <a routerLink="/forms" class="btn">Back</a>
  </div>

  <div class="card">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" [(ngModel)]="name" placeholder="Form name" />
    </div>
    <div class="form-group">
      <label for="desc">Description</label>
      <textarea id="desc" [(ngModel)]="description" placeholder="Optional description"></textarea>
    </div>

    <h2>Questions</h2>

    @for (q of questions(); track q._idx; let i = $index) {
      <div class="question-row card" style="margin-bottom: 12px; padding: 14px; background: #f9fafb;">
        <div style="display: flex; gap: 8px; margin-bottom: 8px;">
          <div style="flex: 1;">
            <input [(ngModel)]="q.label" placeholder="Question label" />
          </div>
          <div style="width: 140px;">
            <select [(ngModel)]="q.type">
              <option value="text">Text</option>
              <option value="yes_no">Yes/No</option>
              <option value="select">Select</option>
              <option value="multi_select">Multi Select</option>
              <option value="number">Number</option>
            </select>
          </div>
          <button class="btn sm danger" (click)="removeQuestion(i)">X</button>
        </div>
        @if (q.type === 'select' || q.type === 'multi_select') {
          <div class="form-group" style="margin-bottom: 8px;">
            <label>Options (comma-separated)</label>
            <input [(ngModel)]="q.optionsStr" placeholder="Option A, Option B, Option C" />
          </div>
        }
      </div>
    }

    <button class="btn" (click)="addQuestion()" style="margin-bottom: 16px;">+ Add Question</button>

    <div class="actions">
      <button class="btn primary" (click)="save()">{{ isNew() ? 'Create' : 'Save' }}</button>
      <a routerLink="/forms" class="btn">Cancel</a>
    </div>
  </div>
</div>
